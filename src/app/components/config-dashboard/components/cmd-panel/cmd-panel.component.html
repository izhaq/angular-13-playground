<div class="cmd-panel">
  <span class="cmd-panel__label">CMD</span>
  <app-multi-dropdown
    [value]="value.sides"
    [options]="sideOptions"
    [disabled]="disabled"
    (changed)="onSidesChanged($event)">
  </app-multi-dropdown>
  <app-multi-dropdown
    [value]="value.wheels"
    [options]="wheelOptions"
    [disabled]="disabled"
    (changed)="onWheelsChanged($event)">
  </app-multi-dropdown>
</div>
