<div class="app-dropdown-wrapper">
  <label *ngIf="label" class="app-dropdown-label">{{ label }}</label>
  <mat-form-field appearance="fill" class="app-dropdown-field">
    <mat-select
      panelClass="app-dropdown-panel"
      disableOptionCentering
      [attr.data-test-id]="testId || null"
      [value]="value"
      [placeholder]="placeholder"
      [disabled]="disabled"
      (selectionChange)="onSelectionChange($event)">
      <mat-option *ngFor="let option of options" [value]="option.value"
                  [attr.data-test-id]="option.value">
        {{ option.label }}
      </mat-option>
    </mat-select>
  </mat-form-field>
</div>
