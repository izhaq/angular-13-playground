<div class="operations__rows">
  <div class="operations__row" *ngFor="let field of fields; trackBy: trackByKey">
    <app-dropdown
      [testId]="field.key"
      [value]="value[field.key]"
      [options]="field.options"
      [label]="field.label"
      [disabled]="disabled"
      (changed)="onControlChanged(field.key, $event)">
    </app-dropdown>
  </div>
</div>
