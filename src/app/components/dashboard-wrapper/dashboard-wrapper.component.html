<div class="wrapper" *ngIf="{ scenario: scenario$ | async, isRealtime: isRealtime$ | async } as vm">
  <header class="wrapper__topbar">
    <app-top-bar
      [selectedScenario]="vm.scenario!"
      [scenarioOptions]="scenarioOptions"
      (scenarioChanged)="onScenarioChanged($event)">
    </app-top-bar>
  </header>

  <mat-tab-group class="wrapper__tabs" animationDuration="0ms">
    <mat-tab label="Frequent CMDs">
      <app-frequent-cmds-tab
        [scenario]="vm.scenario!"
        [isRealtime]="!!vm.isRealtime">
      </app-frequent-cmds-tab>
    </mat-tab>

    <mat-tab label="Rare CMDs">
      <app-rare-cmds-tab
        [scenario]="vm.scenario!"
        [isRealtime]="!!vm.isRealtime">
      </app-rare-cmds-tab>
    </mat-tab>
  </mat-tab-group>
</div>
