<div class="dashboard" *ngIf="vm$ | async as vm">
  <header class="dashboard__topbar">
    <app-top-bar
      [selectedScenario]="vm.state.scenario"
      [scenarioOptions]="scenarioOptions"
      (scenarioChanged)="onScenarioChanged($event, vm.state)"
      (resetClicked)="onReset()">
    </app-top-bar>
  </header>

  <div class="dashboard__content">
    <section class="dashboard__left">
      <app-left-panel
        [dashboardState]="vm.state"
        [disabled]="vm.isRealtime"
        (stateChanged)="onStateChanged($event, vm.state.scenario)"
        (saved)="onSaved($event, vm.state.scenario)"
        (cancelled)="onCancelled()">
      </app-left-panel>
    </section>

    <main class="dashboard__right">
      <app-status-grid></app-status-grid>
    </main>
  </div>
</div>
