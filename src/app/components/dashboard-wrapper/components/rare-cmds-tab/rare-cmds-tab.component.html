<div class="dashboard" *ngIf="dashboardState$ | async as state">
  <div class="dashboard__content">
    <section class="dashboard__left">
      <div class="dashboard__cmd-row" [class.dashboard__cmd-row--disabled]="isRealtime">
        <app-cmd-panel
          [value]="state.cmd"
          [disabled]="isRealtime"
          (changed)="onCmdChanged($event)">
        </app-cmd-panel>
      </div>
      <app-rare-left-panel
        [dashboardState]="state"
        [readOnly]="isRealtime"
        [saveBlocked]="!state.cmd.sides.length || !state.cmd.wheels.length"
        (stateChanged)="onStateChanged($event)"
        (saved)="onSaved($event)"
        (cancelled)="onCancelled()"
        (defaultClicked)="onDefault()">
      </app-rare-left-panel>
    </section>

    <main class="dashboard__right">
      <app-status-grid
        [config]="gridConfig"
        [rows]="(gridRows$ | async) || []">
      </app-status-grid>
    </main>
  </div>
</div>
