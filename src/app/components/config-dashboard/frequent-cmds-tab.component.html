<div class="dashboard" *ngIf="dashboardState$ | async as state">
  <div class="dashboard__content">
    <section class="dashboard__left">
      <app-left-panel
        [dashboardState]="state"
        [disabled]="isRealtime"
        (stateChanged)="onStateChanged($event)"
        (saved)="onSaved($event)"
        (cancelled)="onCancelled()"
        (defaultClicked)="onDefault()">
      </app-left-panel>
    </section>

    <main class="dashboard__right">
      <app-status-grid
        [config]="gridConfig"
        [rows]="(gridRows$ | async) || []">
      </app-status-grid>
    </main>
  </div>
</div>
