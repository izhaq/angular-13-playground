<div class="status-grid" *ngIf="config">
  <table class="status-grid__table">
    <thead>
      <tr>
        <th class="status-grid__label-header"></th>
        <th
          class="status-grid__col-header"
          *ngFor="let col of config.columns; trackBy: trackByColumnId"
          [class.status-grid__col-header--hovered]="isColumnHovered(col.id)"
          (mouseenter)="onColumnHover(col.id)"
          (mouseleave)="onColumnHover(null)">
          {{ col.header }}
        </th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let row of rows; trackBy: trackByField">
        <td class="status-grid__label">{{ row.label }}</td>
        <td
          class="status-grid__cell"
          *ngFor="let col of config.columns; trackBy: trackByColumnId"
          [appTestId]="'cell-' + row.field + '-' + col.id"
          [class.status-grid__cell--hovered]="isColumnHovered(col.id)"
          [class.status-grid__cell--focused]="isCellFocused(row.field, col.id)"
          [class.status-grid__cell--popout]="isCellHovered(row.field, col.id)"
          (mouseenter)="onCellHover(row.field, col.id)"
          (mouseleave)="onCellHover(null, null)"
          (click)="onCellClick(row.field, col.id)">
          <span class="status-grid__cell-text">{{ row.cells[col.id]?.abbr }}</span>
          <span class="status-grid__cell-popout" *ngIf="isCellHovered(row.field, col.id) && row.cells[col.id]?.value">
            {{ row.cells[col.id]?.value }}
          </span>
        </td>
      </tr>
    </tbody>
  </table>
</div>
