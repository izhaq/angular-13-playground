<div class="panel" [formGroup]="form">
  <div class="panel__row">
    <app-cmd-form-panel
      formControlName="commands">
    </app-cmd-form-panel>
  </div>

  <hr class="panel__separator">

  <div class="panel__section">
    <app-operations-form-list
      formControlName="operations">
    </app-operations-form-list>
  </div>
</div>

<footer class="panel__actions">
  <button mat-stroked-button type="button" (click)="onCancel()">Cancel</button>
  <button mat-flat-button color="primary" type="button" (click)="onSave()">Save</button>
</footer>
