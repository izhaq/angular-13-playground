<div class="system-experiments-shell">

  <header class="system-experiments-shell__chrome">
    <mat-slide-toggle
      class="system-experiments-shell__test-mode"
      data-test-id="shell-test-mode-toggle"
      [checked]="testMode"
      (change)="onTestModeChange($event.checked)">
      {{ labels.testMode }}
    </mat-slide-toggle>
  </header>

  <mat-tab-group
    class="system-experiments-shell__tabs app-dashboard-tabs"
    [selectedIndex]="selectedTabIndex"
    (selectedIndexChange)="onTabChange($event)"
    [animationDuration]="'0ms'">

    <mat-tab [label]="labels.tabPrimaryCommands">
      <system-experiments-board>
        <system-experiments-cmd-section
          boardCmd
          [selection]="cmdDraft"
          [disabled]="cmdDisabled"
          (selectionChange)="onCmdSelectionChange($event)">
        </system-experiments-cmd-section>

        <system-experiments-primary-commands-form
          boardForm
          [formGroup]="primary.formGroup">
        </system-experiments-primary-commands-form>

        <system-experiments-status-grid
          boardGrid
          [boardId]="boardIds.primary"
          [columns]="primaryColumns"
          [rows]="(primaryRows$ | async) ?? []">
        </system-experiments-status-grid>
      </system-experiments-board>
    </mat-tab>

    <mat-tab [label]="labels.tabSecondaryCommands">
      <system-experiments-board>
        <system-experiments-cmd-section
          boardCmd
          [selection]="cmdDraft"
          [disabled]="cmdDisabled"
          (selectionChange)="onCmdSelectionChange($event)">
        </system-experiments-cmd-section>

        <system-experiments-secondary-commands-form
          boardForm
          [formGroup]="secondary.formGroup">
        </system-experiments-secondary-commands-form>

        <system-experiments-status-grid
          boardGrid
          [boardId]="boardIds.secondary"
          [columns]="secondaryColumns"
          [rows]="(secondaryRows$ | async) ?? []">
        </system-experiments-status-grid>
      </system-experiments-board>
    </mat-tab>

  </mat-tab-group>

  <!--
    Single shared footer for both tabs. Defaults / Cancel / Apply are
    identical across boards (same disabled rules, same labels) — the
    only per-board variance is which form's handlers run, and that
    routing is trivial via `selectedTabIndex`. See onActive* dispatch
    methods on the component.
  -->
  <system-experiments-board-footer
    class="system-experiments-shell__footer"
    [disabled]="!testMode"
    [applyDisabled]="applyDisabled"
    (defaults)="onActiveDefaults()"
    (cancel)="onActiveCancel()"
    (apply)="onActiveApply()">
  </system-experiments-board-footer>

</div>
