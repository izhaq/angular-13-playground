<div class="top-bar">
  <app-dropdown
    label="Scenario"
    [options]="scenarioOptions"
    [value]="selectedScenario"
    (changed)="scenarioChanged.emit($event)">
  </app-dropdown>
  <span class="top-bar__spacer" aria-hidden="true"></span>
  <button mat-button type="button" (click)="resetClicked.emit()">Reset</button>
</div>
